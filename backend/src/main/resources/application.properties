# Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/nyayamitra
spring.data.mongodb.database=nyayamitra

# JWT Configuration
jwt.secret=NyayaMitraSecretKey2021ForIndianLegalPlatformSecureTokenGeneration
jwt.expiration=86400000

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@nyayamitra.in
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Application Info
spring.application.name=nyaya-mitra-backend

# Logging
logging.level.com.nyayamitra=DEBUG
